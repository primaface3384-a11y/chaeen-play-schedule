name: Keep Supabase project alive

# Supabase free-tier projects auto-pause after 7 days with no API activity.
# This pings the REST API on a schedule so that never happens — no secrets
# needed since the anon key is already public in index.html by design (see
# CLAUDE.md).
#
# It also records the ping as a small commit. GitHub auto-disables scheduled
# workflows after 60 days with no new commits to the repo, and neither
# people just visiting the app nor this workflow's own runs count as a
# "commit" by themselves — only an actual commit does. Committing the
# timestamp closes that loop, so this stays alive indefinitely with zero
# manual maintenance (no need to open the app or touch the code).

on:
  schedule:
    # Twice a week (Mon & Thu, 03:00 UTC) — comfortable margin under both
    # Supabase's 7-day pause threshold and GitHub's 60-day disable threshold.
    - cron: '0 3 * * 1,4'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ping Supabase REST API
        run: |
          curl -sf \
            "https://demwtdbnbhkjfztudqjo.supabase.co/rest/v1/play_types?select=id&limit=1" \
            -H "apikey: sb_publishable_w5GFr-IgQzZ8WAChw5Atbg_BanhsY13" \
            -H "Authorization: Bearer sb_publishable_w5GFr-IgQzZ8WAChw5Atbg_BanhsY13" \
            -o /dev/null

      - name: Record ping (keeps this workflow from being auto-disabled after 60 days)
        run: |
          mkdir -p .github
          date -u +"%Y-%m-%dT%H:%M:%SZ" > .github/last-keepalive-ping.txt
          git config user.name "keepalive-bot"
          git config user.email "actions@users.noreply.github.com"
          git add .github/last-keepalive-ping.txt
          if ! git diff --cached --quiet; then
            git commit -m "chore: keepalive ping"
            git push
          fi
