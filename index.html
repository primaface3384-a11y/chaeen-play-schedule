<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>채은이 놀이 스케줄러</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Gowun+Dodum&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg: #EEF5F1;
    --paper: #FFFFFF;
    --ink: #2E3B36;
    --ink-soft: #6B7A73;
    --line: #DCE8E1;
    --coral: #FF8A70;
    --yellow: #FFC94A;
    --sky: #4FB0E8;
    --grass: #6BC79E;
    --lavender: #B18FE0;
    --pink: #F786B0;
    --today-ring: #FF8A70;
  }
  *{ box-sizing: border-box; }
  body{
    margin:0;
    background: var(--bg);
    background-image:
      radial-gradient(circle at 8% 12%, rgba(255,201,74,0.18) 0, transparent 40%),
      radial-gradient(circle at 92% 88%, rgba(79,176,232,0.15) 0, transparent 40%);
    font-family: 'Gowun Dodum', sans-serif;
    color: var(--ink);
    min-height: 100vh;
    padding: 20px 14px 60px;
  }
  .wrap{ max-width: 640px; margin: 0 auto; }

  header.top{ text-align:center; margin-bottom: 10px; }
  header.top h1{
    font-family: 'Gaegu', cursive;
    font-size: 34px;
    margin: 0 0 4px;
    color: var(--ink);
    letter-spacing: 0.5px;
  }
  header.top h1 .name{ color: var(--coral); }
  header.top p{ margin:0; font-size:13px; color: var(--ink-soft); }

  .sync-status{
    text-align:center; font-size:11px; color: var(--ink-soft);
    display:flex; align-items:center; justify-content:center; gap:6px; margin-bottom:14px;
  }
  .sync-dot{ width:7px; height:7px; border-radius:50%; background: var(--line); transition: background .2s; }
  .sync-dot.on{ background: var(--grass); }
  .sync-dot.off{ background: var(--coral); }

  .month-nav{
    display:flex; align-items:center; justify-content:space-between;
    background: var(--paper); border-radius: 18px; padding: 10px 8px;
    margin-bottom: 14px; box-shadow: 0 2px 10px rgba(46,59,54,0.06);
  }
  .month-nav button{
    border:none; background: var(--bg); color: var(--ink);
    width:38px; height:38px; border-radius:12px; font-size:18px; cursor:pointer;
    transition: transform .15s ease;
  }
  .month-nav button:hover{ transform: scale(1.08); background:#E3EEE8; }
  .month-nav .label{ font-family:'Gaegu',cursive; font-size:22px; }
  .month-nav .today-btn{
    font-family:'Gowun Dodum',sans-serif; font-size:12px; width:auto; padding:0 12px; color: var(--ink-soft);
  }

  .weekdays{
    display:grid; grid-template-columns: repeat(7,1fr);
    text-align:center; font-size:12px; color: var(--ink-soft); margin-bottom:6px; padding: 0 2px;
  }
  .weekdays span:first-child{ color: var(--coral); }
  .weekdays span:last-child{ color: var(--sky); }

  .grid{
    display:grid; grid-template-columns: repeat(7,1fr); gap:6px;
  }
  .day{
    background: var(--paper); border-radius: 14px; min-height: 68px;
    padding: 6px 5px; cursor:pointer; position:relative;
    box-shadow: 0 1px 5px rgba(46,59,54,0.05);
    border: 2px solid transparent;
    display:flex; flex-direction:column; gap:4px;
    transition: transform .12s ease, border-color .12s ease;
  }
  .day.empty{ background: transparent; box-shadow:none; cursor:default; }
  .day:not(.empty):active{ transform: scale(0.96); }
  .day.today{ border-color: var(--today-ring); }
  .day.has-selection{ border-color: var(--lavender); }
  .day .num{ font-size:13px; font-weight:600; color: var(--ink); }
  .day.sun .num{ color: var(--coral); }
  .day.sat .num{ color: var(--sky); }
  .day .dots{ display:flex; flex-wrap:wrap; gap:3px; flex:1; align-items:flex-start; }
  .dot{ width:9px; height:9px; border-radius:50%; flex-shrink:0; }
  .day .more{ font-size:9px; color: var(--ink-soft); }
  .day .total{ font-size:9px; color: var(--ink-soft); margin-top:auto; }

  /* Panel */
  .overlay{
    position:fixed; inset:0; background: rgba(46,59,54,0.35);
    display:none; align-items:flex-end; justify-content:center; z-index:50;
  }
  .overlay.open{ display:flex; }
  .panel{
    background: var(--paper); width:100%; max-width:640px;
    border-radius: 22px 22px 0 0; padding: 18px 18px 26px;
    max-height: 86vh; overflow-y:auto;
    box-shadow: 0 -6px 30px rgba(0,0,0,0.15);
    animation: slideUp .22s ease;
  }
  @keyframes slideUp{ from{ transform: translateY(24px); opacity:0; } to{ transform:none; opacity:1; } }

  .panel-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
  .panel-head h2{ font-family:'Gaegu',cursive; font-size:24px; margin:0; }
  .panel-head .close{ border:none; background: var(--bg); width:32px; height:32px; border-radius:50%; font-size:16px; cursor:pointer; color: var(--ink-soft); }

  .entry-list{ display:flex; flex-direction:column; gap:8px; margin-bottom:16px; }
  .entry{
    display:flex; align-items:center; gap:10px;
    background: var(--bg); border-radius: 12px; padding: 10px 12px;
  }
  .entry .chip-dot{ width:12px; height:12px; border-radius:50%; flex-shrink:0; }
  .entry .info{ flex:1; }
  .entry .type{ font-size:14px; font-weight:600; }
  .entry .mins{ font-size:12px; color: var(--ink-soft); }
  .entry .del{ border:none; background:none; color: var(--ink-soft); font-size:16px; cursor:pointer; padding:4px 6px; }
  .entry .del:hover{ color: var(--coral); }
  .empty-note{ font-size:13px; color: var(--ink-soft); text-align:center; padding: 14px 0; }

  .day-summary{ font-size:12px; color: var(--ink-soft); margin: -8px 0 14px; }

  .add-form{ background: var(--bg); border-radius:16px; padding:14px; }
  .add-form .label{ font-size:12px; color: var(--ink-soft); margin-bottom:6px; display:block; }

  .type-chips{ display:flex; flex-wrap:wrap; gap:6px; margin-bottom:10px; }
  .type-chip{
    border: 1.5px solid var(--line); background: var(--paper); color: var(--ink);
    border-radius: 999px; padding: 6px 12px; font-size:13px; cursor:pointer;
    font-family:'Gowun Dodum',sans-serif;
  }
  .type-chip.selected{ border-color: transparent; color:#fff; }

  .custom-type-row{ margin-bottom:12px; }
  .custom-type-row input{
    width:100%; border:1.5px solid var(--line); border-radius:10px; padding:9px 12px;
    font-size:14px; font-family:'Gowun Dodum',sans-serif; background: var(--paper); color: var(--ink);
  }
  .custom-type-row input:focus{ outline:none; border-color: var(--lavender); }

  .duration-row{ display:flex; align-items:center; gap:12px; margin-bottom:14px; }
  .duration-row button{
    width:40px; height:40px; border-radius:12px; border:none; background: var(--paper);
    font-size:18px; cursor:pointer; box-shadow: 0 1px 4px rgba(46,59,54,0.08); color: var(--ink);

  .duration-row button:active{ transform: scale(0.94); }
  .duration-value{ flex:1; text-align:center; font-family:'Gaegu',cursive; font-size:26px; }
  .duration-value span{ font-size:14px; font-family:'Gowun Dodum',sans-serif; color: var(--ink-soft); }

  .memo-row{ margin-bottom:14px; }

<script>
// ============================================================
// ⚙️ 설정: Supabase 프로젝트 URL과 anon key를 여기에 넣어주세요.
// (Supabase 대시보드 → Project Settings → API 에서 확인)
// ============================================================
const SUPABASE_URL = 'https://demwtdbnbhkjfztudqjo.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_w5GFr-IgQzZ8WAChw5Atbg_BanhsY13';
// ============================================================

const DEFAULT_TYPES = ['블록놀이','그림그리기','책읽기','소꿉놀이','야외놀이','노래율동','퍼즐','물놀이'];
const PALETTE = [
  '#FF8A70','#FFC94A','#4FB0E8','#6BC79E','#B18FE0','#F786B0','#F2A65A','#7FC8C4',
  '#8FA6E0','#E0748F','#9BD46B','#D9A5F2','#5FD1B0','#F2D24A','#7594E8','#E88F5F',
  '#63C2E0','#C48FE0','#8FE0A6','#E06B8F'
];

let sb = null;
let clientInitError = null;
let configured = SUPABASE_URL !== 'YOUR_SUPABASE_URL' && SUPABASE_ANON_KEY !== 'YOUR_SUPABASE_ANON_KEY';
if(configured){
  try{
    if(!window.supabase) throw new Error('Supabase 라이브러리 로드 실패 (CDN 차단/네트워크 문제일 수 있음)');
    sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  }catch(e){
    clientInitError = e.message || String(e);
    console.error('Supabase 클라이언트 생성 오류', e);
  }
}

let data = {};   // { 'YYYY-MM-DD': [{id, type, minutes, memo}] }
let types = DEFAULT_TYPES.map((name,i)=>({ name, color: PALETTE[i % PALETTE.length] })); // [{name, color}], ordered
let current = new Date();
let selectedDate = null;
let selectedType = null;
let duration = 30;
let statsScope = 'month'; // 'month' | 'all'

const grid = document.getElementById('grid');
const monthLabel = document.getElementById('monthLabel');
const overlay = document.getElementById('overlay');
const panelDate = document.getElementById('panelDate');
const daySummary = document.getElementById('daySummary');
const entryList = document.getElementById('entryList');
const typeChipsEl = document.getElementById('typeChips');
const customTypeInput = document.getElementById('customType');
const durationVal = document.getElementById('durationVal');
const memoInput = document.getElementById('memoInput');
const legend = document.getElementById('legend');
const typesOverlay = document.getElementById('typesOverlay');
const typesEditorList = document.getElementById('typesEditorList');
const newTypeInput = document.getElementById('newTypeInput');
const newTypeBtn = document.getElementById('newTypeBtn');
const statsOverlay = document.getElementById('statsOverlay');

const syncDot = document.getElementById('syncDot');
const syncLabel = document.getElementById('syncLabel');

function setSyncStatus(state, detail){
  // state: 'on' | 'off' | 'busy'
  syncDot.className = 'sync-dot' + (state==='on' ? ' on' : state==='off' ? ' off' : '');
  const base = state==='on' ? '실시간 연결됨' : state==='off' ? '연결 끊김 (재시도 중)' : '연결 중...';
  syncLabel.textContent = detail ? `${base} — ${detail}` : base;
}

function withTimeout(promise, ms, label){
  return Promise.race([
    promise,
    new Promise((_, reject)=> setTimeout(()=> reject(new Error(`${label} 응답 없음 (${ms/1000}초 초과)`)), ms))
  ]);
}

function hslToHex(h, s, l){
  s /= 100; l /= 100;
  const k = n => (n + h / 30) % 12;
  const a = s * Math.min(l, 1 - l);
  const f = n => l - a * Math.max(-1, Math.min(k(n) - 3, Math.min(9 - k(n), 1)));
  const toHex = x => Math.round(255 * x).toString(16).padStart(2, '0');
  return `#${toHex(f(0))}${toHex(f(8))}${toHex(f(4))}`;
}

// Deterministic fallback color for a name that has no stored color
// (e.g. an old entry whose type was later renamed or deleted).
function colorFromHash(name){
  let hash = 0;
  for(let i=0;i<name.length;i++){ hash = (hash * 31 + name.charCodeAt(i)) % 360; }
  return hslToHex(hash, 65, 60);
}

// Picks a color from PALETTE that isn't in use by any current type; once the
// palette is exhausted, generates further colors spaced by the golden angle
// so they stay visually distinct from each other and from the palette.
function pickUnusedColor(usedColors){
  const used = usedColors || new Set(types.map(t=>t.color).filter(Boolean));
  const free = PALETTE.find(c=>!used.has(c));
  if(free) return free;
  let hue = (used.size * 137.508) % 360;
  let color = hslToHex(hue, 65, 60);
  let guard = 0;
  while(used.has(color) && guard < 72){
    hue = (hue + 137.508) % 360;
    color = hslToHex(hue, 65, 60);
    guard++;
  }
  return color;
}

function colorForType(type){
  const t = types.find(x=>x.name===type);
  if(t && t.color) return t.color;
  return colorFromHash(type);
}

// ---------- Supabase data access ----------
async function fetchAll(){
  const [entriesRes, typesRes] = await withTimeout(Promise.all([
    sb.from('play_entries').select('*').order('entry_date', { ascending: true }),
    sb.from('play_types').select('*').order('sort_order', { ascending: true })
  ]), 10000, 'Supabase');
  if(entriesRes.error) throw entriesRes.error;
  if(typesRes.error) throw typesRes.error;

  const newData = {};
  (entriesRes.data || []).forEach(row=>{
    const d = row.entry_date;
    if(!newData[d]) newData[d] = [];
    newData[d].push({ id: row.id, type: row.type, minutes: row.minutes, memo: row.memo || '' });
  });
  const newTypes = (typesRes.data && typesRes.data.length)
    ? typesRes.data.map(r=>({ name: r.name, color: r.color }))
    : DEFAULT_TYPES.map((name,i)=>({ name, color: PALETTE[i % PALETTE.length] }));

  // Self-heal any legacy rows saved before the color column existed: assign
  // an unused color once and persist it, instead of recomputing by index
  // every render (which is what caused colors to shift/collide before).
  const usedColors = new Set(newTypes.map(t=>t.color).filter(Boolean));
  newTypes.forEach(t=>{
    if(!t.color){
      const color = pickUnusedColor(usedColors);
      t.color = color;
      usedColors.add(color);
      sb.from('play_types').update({ color }).eq('name', t.name).then(({error})=>{
        if(error) console.error('색상 보정 실패', error);
      });
    }
  });

  data = newData;
  types = newTypes;
}

async function refreshAndRender(){
  try{
    await fetchAll();
    setSyncStatus('on');
  }catch(e){
    console.error('불러오기 오류', e);
    setSyncStatus('off', e.message || String(e));
  }
  renderCalendar();
  if(overlay.classList.contains('open') && selectedDate){
    renderEntries();
  }
  if(typesOverlay.classList.contains('open')){
    renderTypesEditor();
  }
  if(statsOverlay.classList.contains('open')){
    renderStats();
  }
}

async function insertEntry(dateStr, type, minutes, memo){
  const { error } = await sb.from('play_entries').insert({ entry_date: dateStr, type, minutes, memo: memo || null });
  if(error) throw error;
}
async function deleteEntryRow(id){
  const { error } = await sb.from('play_entries').delete().eq('id', id);
  if(error) throw error;
}
async function ensureType(name, color){
  const nextOrder = types.length;
  const { error } = await sb.from('play_types').upsert(
    { name, sort_order: nextOrder, color },
    { onConflict: 'name', ignoreDuplicates: true }
  );
  if(error) throw error;
}
async function renameTypeRow(oldName, newName){
  const { error: e1 } = await sb.from('play_types').update({ name: newName }).eq('name', oldName);
  if(e1) throw e1;
  const { error: e2 } = await sb.from('play_entries').update({ type: newName }).eq('type', oldName);
  if(e2) throw e2;
}
async function deleteTypeRow(name){
  const { error } = await sb.from('play_types').delete().eq('name', name);
  if(error) throw error;
}

// ---------- Rendering (same as before) ----------
function fmtDate(y,m,d){
  return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}

function renderLegend(){
  legend.innerHTML = '';
  types.forEach(t=>{
    const span = document.createElement('span');
    span.innerHTML = `<span class="dot" style="background:${t.color}"></span>${escapeHtml(t.name)}`;
    legend.appendChild(span);
  });
}

function renderCalendar(){
  const y = current.getFullYear();
  const m = current.getMonth();
  monthLabel.textContent = `${y}년 ${m+1}월`;
  grid.innerHTML = '';

  const firstDay = new Date(y, m, 1).getDay();
  const daysInMonth = new Date(y, m+1, 0).getDate();
  const todayStr = fmtDate(new Date().getFullYear(), new Date().getMonth(), new Date().getDate());

  for(let i=0;i<firstDay;i++){
    const empty = document.createElement('div');
    empty.className = 'day empty';
    grid.appendChild(empty);
  }

  for(let d=1; d<=daysInMonth; d++){
    const dateStr = fmtDate(y,m,d);
    const cell = document.createElement('div');
    const dow = new Date(y,m,d).getDay();
    cell.className = 'day' + (dow===0?' sun':'') + (dow===6?' sat':'') + (dateStr===todayStr?' today':'');
    if(data[dateStr] && data[dateStr].length) cell.className += ' has-selection';

    const num = document.createElement('div');
    num.className = 'num';
    num.textContent = d;
    cell.appendChild(num);

    const dots = document.createElement('div');
    dots.className = 'dots';
    const entries = data[dateStr] || [];
    entries.slice(0,6).forEach(e=>{
      const dot = document.createElement('div');
      dot.className = 'dot';
      dot.style.background = colorForType(e.type);
      dots.appendChild(dot);
    });
    cell.appendChild(dots);

    if(entries.length){
      const totalMin = entries.reduce((s,e)=>s+e.minutes,0);
      const total = document.createElement('div');
      total.className = 'total';
      total.textContent = `${totalMin}분`;
      cell.appendChild(total);
    }

    cell.addEventListener('click', ()=> openPanel(dateStr));
    grid.appendChild(cell);
  }
  renderLegend();
}

function openPanel(dateStr){
  selectedDate = dateStr;
  const [y,m,d] = dateStr.split('-').map(Number);
  panelDate.textContent = `${m}월 ${d}일`;
  duration = 30;
  durationVal.textContent = duration;
  customTypeInput.value = '';
  memoInput.value = '';
  selectedType = null;
  renderTypeChips();
  renderEntries();
  overlay.classList.add('open');
}

function closePanel(){
  overlay.classList.remove('open');
  selectedDate = null;
}

function renderTypeChips(){
  typeChipsEl.innerHTML = '';
  types.forEach(t=>{
    const chip = document.createElement('button');
    chip.className = 'type-chip' + (selectedType===t.name?' selected':'');
    chip.textContent = t.name;
    if(selectedType===t.name){ chip.style.background = t.color; chip.style.borderColor = t.color; }
    chip.addEventListener('click', ()=>{
      selectedType = (selectedType===t.name) ? null : t.name;
      customTypeInput.value = '';
      renderTypeChips();
    });
    typeChipsEl.appendChild(chip);
  });
}

customTypeInput.addEventListener('input', ()=>{
  if(customTypeInput.value.trim()){
    selectedType = null;
    renderTypeChips();
  }
});

function renderEntries(){
  const entries = data[selectedDate] || [];
  entryList.innerHTML = '';
  if(!entries.length){
    daySummary.textContent = '아직 기록된 놀이가 없어요.';
    const note = document.createElement('div');
    note.className = 'empty-note';
    note.textContent = '오늘의 첫 놀이를 기록해보세요! 🎨';
    entryList.appendChild(note);
    return;
  }
  const totalMin = entries.reduce((s,e)=>s+e.minutes,0);
  const h = Math.floor(totalMin/60), mm = totalMin%60;
  daySummary.textContent = `오늘 총 ${entries.length}개 놀이 · ${h>0 ? h+'시간 ':''}${mm}분`;

  entries.forEach(e=>{
    const row = document.createElement('div');
    row.className = 'entry';
    row.innerHTML = `
      <div class="chip-dot" style="background:${colorForType(e.type)}"></div>
      <div class="info">
        <div class="type">${escapeHtml(e.type)}</div>
        <div class="mins">${e.minutes}분</div>
        ${e.memo ? `<div class="memo">📝 ${escapeHtml(e.memo)}</div>` : ''}
      </div>
      <button class="del" data-id="${e.id}">✕</button>
    `;
    entryList.appendChild(row);
  });

  entryList.querySelectorAll('.del').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const id = btn.getAttribute('data-id');
      btn.disabled = true;
      try{
        await deleteEntryRow(id);
        // realtime subscription will trigger refreshAndRender(); but update optimistically too
        data[selectedDate] = (data[selectedDate]||[]).filter(e=>String(e.id)!==id);
        if(data[selectedDate].length===0) delete data[selectedDate];
        renderEntries();
        renderCalendar();
      }catch(e){
        console.error('삭제 오류', e);
        alert('삭제에 실패했어요. 인터넷 연결을 확인해주세요.');
        btn.disabled = false;
      }
    });
  });
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

document.getElementById('minusBtn').addEventListener('click', ()=>{
  duration = Math.max(10, duration - 10);
  durationVal.textContent = duration;
});
document.getElementById('plusBtn').addEventListener('click', ()=>{
  duration = Math.min(600, duration + 10);
  durationVal.textContent = duration;
});

document.getElementById('addBtn').addEventListener('click', async ()=>{
  const type = (customTypeInput.value.trim()) || selectedType;
  if(!type){
    customTypeInput.focus();
    customTypeInput.style.borderColor = '#FF8A70';
    setTimeout(()=>{ customTypeInput.style.borderColor = ''; }, 900);
    return;
  }
  const addBtn = document.getElementById('addBtn');
  addBtn.disabled = true;
  addBtn.textContent = '추가하는 중...';
  try{
    if(!types.find(t=>t.name===type)){
      const color = pickUnusedColor();
      await ensureType(type, color);
      types.push({ name: type, color });
    }
    const memo = memoInput.value.trim();
    await insertEntry(selectedDate, type, duration, memo);
    if(!data[selectedDate]) data[selectedDate] = [];
    data[selectedDate].push({ id: 'temp-'+Date.now(), type, minutes: duration, memo });
    customTypeInput.value = '';
    memoInput.value = '';
    selectedType = null;
    duration = 30;
    durationVal.textContent = duration;
    renderTypeChips();
    renderEntries();
    renderCalendar();
    // pull the real row (with real id) from the server shortly after
    setTimeout(refreshAndRender, 600);
  }catch(e){
    console.error('저장 오류', e);
    alert('저장에 실패했어요. 인터넷 연결을 확인해주세요.');
  }finally{
    addBtn.disabled = false;
    addBtn.textContent = '놀이 추가하기';
  }
});

document.getElementById('closeBtn').addEventListener('click', closePanel);
overlay.addEventListener('click', (e)=>{ if(e.target===overlay) closePanel(); });

function onMonthChanged(){
  renderCalendar();
  if(statsOverlay.classList.contains('open') && statsScope === 'month'){
    renderStats();
  }
}
document.getElementById('prevBtn').addEventListener('click', ()=>{
  current = new Date(current.getFullYear(), current.getMonth()-1, 1);
  onMonthChanged();
});
document.getElementById('nextBtn').addEventListener('click', ()=>{
  current = new Date(current.getFullYear(), current.getMonth()+1, 1);
  onMonthChanged();
});
document.getElementById('todayBtn').addEventListener('click', ()=>{
  current = new Date();
  onMonthChanged();
});

function renderTypesEditor(){
  typesEditorList.innerHTML = '';
  types.forEach((t)=>{
    const row = document.createElement('div');
    row.className = 'type-row';
    row.innerHTML = `
      <div class="chip-dot" style="background:${t.color}"></div>
      <input type="text" value="${escapeHtml(t.name)}" data-name="${escapeHtml(t.name)}">
      <button class="del" data-name="${escapeHtml(t.name)}" title="삭제">✕</button>
    `;
    typesEditorList.appendChild(row);
  });

  typesEditorList.querySelectorAll('input').forEach(input=>{
    const commit = async ()=>{
      const oldName = input.getAttribute('data-name');
      const newName = input.value.trim();
      if(!newName || newName === oldName){ input.value = oldName; return; }
      input.disabled = true;
      try{
        await renameTypeRow(oldName, newName);
        await refreshAndRender();
        renderTypesEditor();
      }catch(e){
        console.error('이름 변경 오류', e);
        alert('변경에 실패했어요.');
        input.value = oldName;
        input.disabled = false;
      }
    };
    input.addEventListener('blur', commit);
    input.addEventListener('keydown', (e)=>{ if(e.key==='Enter'){ input.blur(); } });
  });

  typesEditorList.querySelectorAll('.del').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const name = btn.getAttribute('data-name');
      btn.disabled = true;
      try{
        await deleteTypeRow(name);
        await refreshAndRender();
        renderTypesEditor();
      }catch(e){
        console.error('삭제 오류', e);
        alert('삭제에 실패했어요.');
        btn.disabled = false;
      }
    });
  });
}

function updateNewTypeBtnState(){
  newTypeBtn.disabled = !newTypeInput.value.trim();
}
newTypeInput.addEventListener('input', updateNewTypeBtnState);
newTypeInput.addEventListener('keydown', (e)=>{ if(e.key==='Enter' && !newTypeBtn.disabled) newTypeBtn.click(); });
updateNewTypeBtnState();

newTypeBtn.addEventListener('click', async ()=>{
  const name = newTypeInput.value.trim();
  if(!name || types.find(t=>t.name===name)) return;
  newTypeBtn.disabled = true;
  try{
    await ensureType(name, pickUnusedColor());
    newTypeInput.value = '';
    await refreshAndRender();
    renderTypesEditor();
  }catch(e){
    console.error('추가 오류', e);
    alert('추가에 실패했어요.');
  }finally{
    updateNewTypeBtnState();
  }
});

document.getElementById('editTypesBtn').addEventListener('click', ()=>{
  renderTypesEditor();
  typesOverlay.classList.add('open');
});
document.getElementById('closeTypesBtn').addEventListener('click', ()=>{
  typesOverlay.classList.remove('open');
});
typesOverlay.addEventListener('click', (e)=>{ if(e.target===typesOverlay){ typesOverlay.classList.remove('open'); } });

document.getElementById('exportBtn').addEventListener('click', async ()=>{
  const btn = document.getElementById('exportBtn');
  const originalText = btn.textContent;
  btn.disabled = true;
  btn.textContent = '백업 만드는 중...';
  try{
    const [entriesRes, typesRes] = await Promise.all([
      sb.from('play_entries').select('*').order('entry_date', { ascending: true }),
      sb.from('play_types').select('*').order('sort_order', { ascending: true })
    ]);
    if(entriesRes.error) throw entriesRes.error;
    if(typesRes.error) throw typesRes.error;

    const backup = {
      exported_at: new Date().toISOString(),
      play_entries: entriesRes.data || [],
      play_types: typesRes.data || []
    };
    const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const dateStr = fmtDate(new Date().getFullYear(), new Date().getMonth(), new Date().getDate());
    a.href = url;
    a.download = `chaeen-scheduler-backup-${dateStr}.json`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  }catch(e){
    console.error('백업 오류', e);
    alert('백업에 실패했어요. 인터넷 연결을 확인해주세요.');
  }finally{
    btn.disabled = false;
    btn.textContent = originalText;
  }
});

// ---------- Stats ----------
function computeStats(scope){
  const y = current.getFullYear(), m = current.getMonth();
  const perType = {}; // name -> {count, minutes}
  let totalCount = 0, totalMinutes = 0;
  const activeDates = new Set();

  Object.keys(data).forEach(dateStr=>{
    if(scope === 'month'){
      const [dy, dm] = dateStr.split('-').map(Number);
      if(dy !== y || dm !== m + 1) return;
    }
    const entries = data[dateStr];
    if(!entries || !entries.length) return;
    activeDates.add(dateStr);
    entries.forEach(e=>{
      if(!perType[e.type]) perType[e.type] = { count: 0, minutes: 0 };
      perType[e.type].count++;
      perType[e.type].minutes += e.minutes;
      totalCount++;
      totalMinutes += e.minutes;
    });
  });

  return { perType, totalCount, totalMinutes, activeDays: activeDates.size };
}

function renderStats(){
  const stats = computeStats(statsScope);
  const h = Math.floor(stats.totalMinutes / 60), mm = stats.totalMinutes % 60;
  const label = statsScope === 'month' ? `${current.getFullYear()}년 ${current.getMonth() + 1}월` : '전체 기간';

  statsSummary.innerHTML = `
    <div class="stats-summary-title">${label}</div>
    <div class="stats-summary-nums">
      <div><strong>${stats.totalCount}</strong><span>놀이 횟수</span></div>
      <div><strong>${stats.activeDays}</strong><span>활동한 날</span></div>
      <div><strong>${h > 0 ? h + '시간 ' : ''}${mm}분</strong><span>총 시간</span></div>
    </div>
  `;

  statsList.innerHTML = '';
  const rows = Object.entries(stats.perType).sort((a, b)=> b[1].minutes - a[1].minutes);
  if(!rows.length){
    statsList.innerHTML = '<div class="empty-note">기록된 놀이가 없어요.</div>';
    return;
  }
  const maxMinutes = Math.max(...rows.map(r=>r[1].minutes));
  rows.forEach(([name, s])=>{
    const pct = stats.totalMinutes ? Math.round(s.minutes / stats.totalMinutes * 100) : 0;
    const barPct = maxMinutes ? Math.round(s.minutes / maxMinutes * 100) : 0;
    const color = colorForType(name);
    const row = document.createElement('div');
    row.className = 'stats-row';
    row.innerHTML = `
      <div class="stats-row-head">
        <span class="chip-dot" style="background:${color}"></span>
        <span class="stats-row-name">${escapeHtml(name)}</span>
        <span class="stats-row-nums">${s.count}회 · ${s.minutes}분 (${pct}%)</span>
      </div>
      <div class="stats-bar-track"><div class="stats-bar-fill" style="width:${barPct}%; background:${color}"></div></div>
    `;
    statsList.appendChild(row);
  });
}

document.getElementById('statsBtn').addEventListener('click', ()=>{
  renderStats();
  statsOverlay.classList.add('open');
});
document.getElementById('closeStatsBtn').addEventListener('click', ()=>{
  statsOverlay.classList.remove('open');
});
statsOverlay.addEventListener('click', (e)=>{ if(e.target===statsOverlay){ statsOverlay.classList.remove('open'); } });

document.getElementById('statsMonthBtn').addEventListener('click', ()=>{
  statsScope = 'month';
  document.getElementById('statsMonthBtn').classList.add('selected');
  document.getElementById('statsAllBtn').classList.remove('selected');
  renderStats();
});
document.getElementById('statsAllBtn').addEventListener('click', ()=>{
  statsScope = 'all';
  document.getElementById('statsAllBtn').classList.add('selected');
  document.getElementById('statsMonthBtn').classList.remove('selected');
  renderStats();
});

// ---------- Init + realtime subscriptions ----------
async function init(){
  if(!configured){
    document.getElementById('setupBanner').style.display = 'block';
    setSyncStatus('off');
    renderCalendar();
    return;
  }
  if(clientInitError){
    setSyncStatus('off', clientInitError);
    renderCalendar();
    return;
  }
  setSyncStatus('busy');
  await refreshAndRender();

  sb
    .channel('play_entries_changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'play_entries' }, ()=> refreshAndRender())
    .subscribe();

  sb
    .channel('play_types_changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'play_types' }, ()=> refreshAndRender())
    .subscribe();
}
init().catch(e=>{
  console.error('초기화 오류', e);
  setSyncStatus('off', e.message || String(e));
  renderCalendar();
});
</script>
