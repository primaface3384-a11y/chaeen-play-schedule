<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>진단 페이지</title>
</head>
<body style="font-family: -apple-system, monospace; padding:16px; white-space:pre-wrap; word-break:break-all; font-size:14px; line-height:1.6;">
<div id="out">페이지 로드됨. 스크립트 시작 전...</div>
<script>
const out = document.getElementById('out');
function log(msg){
  out.textContent += '\n' + msg;
  console.log(msg);
}
log('실행 시각: ' + new Date().toISOString());
log('✅ 1) 인라인 스크립트 실행됨');

const SUPABASE_URL = 'https://demwtdbnbhkjfztudqjo.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_w5GFr-IgQzZ8WAChw5Atbg_BanhsY13';

log('⏳ 2) fetch()로 Supabase REST API 직접 호출 시도...');
fetch(SUPABASE_URL + '/rest/v1/play_types?select=*', {
  headers: { apikey: SUPABASE_ANON_KEY, Authorization: 'Bearer ' + SUPABASE_ANON_KEY }
}).then(async res=>{
  log('✅ 3) 응답 도착 — status: ' + res.status);
  const text = await res.text();
  log('   body: ' + text.slice(0, 500));
}).catch(err=>{
  log('❌ 3) fetch 에러: ' + (err && err.message ? err.message : String(err)));
});

log('⏳ 4) supabase-js CDN 스크립트 로드 시도...');
const s = document.createElement('script');
s.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2';
s.onload = ()=>{
  log('✅ 5) supabase-js 로드 성공 — window.supabase 타입: ' + (typeof window.supabase));
  runClientTest();
};
s.onerror = ()=> log('❌ 5) supabase-js CDN 로드 실패 (네트워크/차단 문제)');
document.body.appendChild(s);

function runClientTest(){
  log('⏳ 6) supabase-js createClient() 호출...');
  let client;
  try{
    client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    log('✅ 7) createClient() 성공 — 타입: ' + typeof client);
  }catch(e){
    log('❌ 7) createClient() 에러: ' + (e && e.message ? e.message : String(e)));
    return;
  }

  log('⏳ 8) client.from(\'play_types\').select(\'*\') 호출...');
  const queryPromise = client.from('play_types').select('*').order('sort_order', { ascending: true });
  log('   (호출문 실행됨, Promise 대기 중 — thenable 타입: ' + typeof (queryPromise && queryPromise.then) + ')');

  const timeoutPromise = new Promise((_, reject)=> setTimeout(()=> reject(new Error('8초 초과, 응답 없음')), 8000));

  Promise.race([queryPromise, timeoutPromise]).then(res=>{
    log('✅ 9) client 쿼리 응답 도착 — error: ' + JSON.stringify(res.error) + ', data 개수: ' + (res.data ? res.data.length : 'null'));
  }).catch(err=>{
    log('❌ 9) client 쿼리 실패/타임아웃: ' + (err && err.message ? err.message : JSON.stringify(err)));
  });
}

log('⏳ 10) 지금 서버가 실제로 서빙 중인 index.html 내용 확인...');
fetch('./index.html?bust=' + Date.now(), { cache: 'no-store' }).then(async res=>{
  const text = await res.text();
  const hasTimeoutFix = text.includes('withTimeout');
  const hasClientErrorFix = text.includes('clientInitError');
  log('✅ 11) index.html 응답 도착 — status: ' + res.status + ', 길이: ' + text.length + ' bytes');
  log('   최신 코드(withTimeout) 포함 여부: ' + hasTimeoutFix);
  log('   최신 코드(clientInitError) 포함 여부: ' + hasClientErrorFix);
  if(!hasTimeoutFix || !hasClientErrorFix){
    log('   ⚠️ 옛날 버전이 캐시되어 서빙되고 있음 (CDN 캐시 문제)');
  }else{
    log('   ✅ 최신 버전이 정상 서빙되고 있음 (캐시 문제 아님)');
  }
}).catch(err=>{
  log('❌ 11) index.html fetch 에러: ' + (err && err.message ? err.message : String(err)));
});

setTimeout(()=>{ log('⏰ 10초 경과 — 위에 3), 5), 7), 9), 11)번 결과가 안 찍혔다면 그 단계에서 멈춘 것'); }, 10000);
</script>
</body>
</html>
